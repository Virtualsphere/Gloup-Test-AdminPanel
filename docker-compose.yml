services:
  admin-panel:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL:-https://api.v1.gloup.in}
        - VITE_IMAGE_BASE_URL=${VITE_IMAGE_BASE_URL:-https://api.v1.gloup.in}
    image: gloup-admin-panel:latest
    restart: unless-stopped
    ports:
      - "${PORT:-3001}:80"
